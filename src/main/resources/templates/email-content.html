<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email</title>
</head>

<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f6f8;">

<table align="center" width="100%" cellpadding="0" cellspacing="0"
       style="max-width:600px; margin:30px auto; background-color:#ffffff; border-radius:8px;">

    <!-- Header -->
    <tr>
        <td style="background-color:#2563eb; padding:20px; text-align:center; color:#ffffff;">
            <h2 style="margin:0;" th:text="${appName}">App Name</h2>
        </td>
    </tr>

    <!-- Body -->
    <tr>
        <td style="padding:30px; color:#333333;">
            <h3 style="margin-top:0;">
                OTP: <span th:text="${name}">User</span> 👈
            </h3>

            <p style="line-height:1.6; font-size:16px;"
               th:text="${message}">
                Email message goes here.
            </p>

            <div style="margin:25px 0; text-align:center;">
                <a th:href="${buttonLink}"
                   style="background-color:#2563eb; color:#ffffff;
                          padding:14px 24px; text-decoration:none;
                          border-radius:6px; font-weight:bold;">
                    <span th:text="${buttonText}">Click Here</span>
                </a>
            </div>

            <p style="font-size:13px; color:#777;">
                If you did not request this email, please Report by replying to this mail.
            </p>
        </td>
    </tr>

    <!-- Footer -->
    <tr>
        <td style="background-color:#f4f6f8; padding:20px; text-align:center; font-size:12px; color:#888;">
            © <span th:text="${expires}">2026</span>
        </td>
    </tr>

</table>

</body>
</html>
